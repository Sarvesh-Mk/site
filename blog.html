<!DOCTYPE html>
<html>
<head>
  <title>Blog - Hey I'm Sarvesh!</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    main {
      width: 100%;
      max-width: 700px;
      padding: 2rem 1rem;
      text-align: left;
    }
    a {
      color: #fff;
    }
    .post-title {
      font-size: 1.4rem;
      font-weight: bold;
      color: #888;
    }
    .post-date {
      color: #888;
      font-size: 1.1rem;
      margin-left: 0.75rem;
    }
    .post {
      margin-bottom: 1rem;
    }
    .post.important .post-title {
      font-size: 1.9rem;
      color: #fff;
    }
    .post[open] .post-title {
      display: none;
    }
    .post summary {
      cursor: pointer;
      padding: 0.5rem 0;
    }
    .post + .post {
      border-top: 1px solid #333;
      padding-top: 1rem;
    }
  </style>
</head>
<body>
  <main id="content">Loading...</main>

  <script>
    const content = document.getElementById("content");

    fetch("posts/index.json")
      .then(res => res.json())
      .then(posts =>
        Promise.all(
          posts.map(p =>
            fetch("posts/" + p.file)
              .then(res => res.text())
              .then(md => ({
                ...p,
                title: (md.match(/^#\s+(.*)$/m) || [, p.file])[1],
                html: marked.parse(md)
              }))
          )
        )
      )
      .then(posts => {
        content.innerHTML =
          "<h1>What I've been up to</h1>" +
          "<p><a href='index.html'>&larr; Go Back</a></p>" +
          posts
            .map(
              p =>
                '<details class="post' + (p.important ? " important" : "") + '"><summary><span class="post-title">' + p.title +
                '</span><span class="post-date">' + p.date + "</span></summary>" + p.html + "</details>"
            )
            .join("");
      });
  </script>
</body>
</html>
