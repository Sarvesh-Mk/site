<!DOCTYPE html>
<html>
<head>
  <title>Blog - Hey I'm Sarvesh!</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    main {
      width: 100%;
      max-width: 700px;
      padding: 2rem 1rem;
      text-align: left;
    }
    a {
      color: #fff;
    }
    .post-date {
      color: #888;
      font-size: 0.9rem;
    }
    .post {
      margin-bottom: 3rem;
    }
    .post + .post {
      border-top: 1px solid #333;
      padding-top: 2rem;
    }
  </style>
</head>
<body>
  <main id="content">Loading...</main>

  <script>
    const content = document.getElementById("content");

    fetch("posts/index.json")
      .then(res => res.json())
      .then(posts =>
        Promise.all(
          posts.map(p =>
            fetch("posts/" + p.file)
              .then(res => res.text())
              .then(md => ({ ...p, html: marked.parse(md) }))
          )
        )
      )
      .then(posts => {
        content.innerHTML =
          "<h1>What I've been up to</h1>" +
          "<p><a href='index.html'>&larr; Go Back</a></p>" +
          posts
            .map(
              p =>
                "<hr>" + '<div class="post"><h2 class="post-date">' + p.date + "</h2>" + p.html + "</div>" + "<hr>" 
            )
            .join("");
      });
  </script>
</body>
</html>
